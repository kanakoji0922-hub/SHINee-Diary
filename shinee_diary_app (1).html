<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root{
    --paq:#6FE3D5;          /* pearl aqua green */
    --paq-deep:#1F9E92;
    --paq-dark:#114b46;
    --paq-mid:#2DB6A8;
    --paq-light:#E7FBF7;
    --paq-pale:#F4FDFB;
    --ink:#163631;
    --ink-soft:#4c6f69;
    --line:#cdeee8;
    --white:#ffffff;
    --shadow:0 8px 30px -12px rgba(31,158,146,.35);
    --pearl:linear-gradient(135deg,#D9F7F1 0%,#A9EBE0 38%,#CFF6EF 64%,#8FE2D6 100%);
    --m-all:#1F9E92;
    --m-onew:#27B79A;
    --m-key:#229FB0;
    --m-minho:#4FC388;
    --m-taemin:#2E9FCF;
    --font-disp:'Outfit','Zen Maru Gothic','Hiragino Sans','Noto Sans JP',sans-serif;
    --font-body:'Zen Maru Gothic','Hiragino Sans','Noto Sans JP','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;background:#EAFBF8}
  body{font-family:var(--font-body);color:var(--ink);background:#EAFBF8;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  #app{
    max-width:980px;margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 8px) 16px calc(80px + env(safe-area-inset-bottom));
  }

  .bg-mesh{
    position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(60% 50% at 12% 8%, rgba(143,226,214,.55), transparent 60%),
      radial-gradient(55% 45% at 92% 4%, rgba(169,235,224,.5), transparent 55%),
      radial-gradient(70% 60% at 85% 95%, rgba(111,227,213,.4), transparent 60%),
      linear-gradient(180deg,#F4FDFB,#E7FBF7 60%,#ddf6f1);
  }

  header{padding:24px 0 14px;text-align:center}
  .crest{font-size:22px;letter-spacing:.4em;margin-bottom:6px}
  h1{
    font-family:var(--font-disp);font-weight:800;font-size:clamp(26px,7vw,40px);
    letter-spacing:.02em;color:var(--paq-dark);
    background:linear-gradient(120deg,#0f6a62,#2DB6A8 55%,#5bd8c9);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .subtitle{font-size:12px;color:var(--ink-soft);letter-spacing:.18em;margin-top:4px;font-family:var(--font-disp);font-weight:500}

  .tabs{display:flex;gap:8px;justify-content:center;margin:20px 0 16px}
  .tab{
    font-family:var(--font-disp);font-weight:700;font-size:14px;letter-spacing:.06em;
    padding:10px 22px;border-radius:999px;border:1.5px solid var(--line);
    background:rgba(255,255,255,.6);color:var(--paq-deep);cursor:pointer;transition:.2s;backdrop-filter:blur(4px)
  }
  .tab.active{background:var(--pearl);color:var(--paq-dark);border-color:transparent;box-shadow:var(--shadow)}

  .filters{
    background:rgba(255,255,255,.72);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:20px;padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow)
  }
  .filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:10px}
  .filter-row:last-child{margin-bottom:0}
  .filter-label{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.12em;width:62px;flex-shrink:0;font-family:var(--font-disp)}
  .chip{
    font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;cursor:pointer;
    border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:.15s;white-space:nowrap
  }
  .chip.on{background:var(--paq-deep);color:#fff;border-color:var(--paq-deep)}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .count{font-size:13px;color:var(--ink-soft);font-family:var(--font-disp);font-weight:500}
  .count b{color:var(--paq-deep)}
  .tool-btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn-add{
    font-family:var(--font-disp);font-weight:700;font-size:14px;letter-spacing:.04em;
    padding:11px 20px;border:none;border-radius:999px;cursor:pointer;color:#fff;
    background:linear-gradient(120deg,var(--paq-deep),var(--paq-mid));box-shadow:var(--shadow);transition:.2s
  }
  .btn-add:active{transform:scale(.97)}
  .btn-fetch{
    font-family:var(--font-disp);font-weight:700;font-size:14px;letter-spacing:.04em;
    padding:11px 18px;border:1.5px solid var(--paq);border-radius:999px;cursor:pointer;
    color:var(--paq-deep);background:rgba(255,255,255,.7);backdrop-filter:blur(4px);transition:.2s
  }
  .btn-fetch:active{transform:scale(.97)}

  .month-head{
    font-family:var(--font-disp);font-weight:800;font-size:15px;letter-spacing:.1em;color:var(--paq-dark);
    margin:22px 0 12px;padding-left:4px;display:flex;align-items:center;gap:10px
  }
  .month-head::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  .card{
    position:relative;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:18px;
    padding:16px 18px 16px 22px;margin-bottom:12px;cursor:pointer;transition:.18s;overflow:hidden;backdrop-filter:blur(6px)
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--accent,var(--paq))}
  .card:active{transform:scale(.99)}
  .card.past{opacity:.72}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card-date{font-family:var(--font-disp);font-weight:700;font-size:13px;color:var(--paq-deep);letter-spacing:.03em;white-space:nowrap}
  .card-date .wd{font-size:11px;color:var(--ink-soft);margin-left:3px}
  .card-time{font-size:11px;color:var(--ink-soft);margin-top:1px}
  .card-title{font-weight:700;font-size:16px;margin:7px 0 4px;color:var(--ink);line-height:1.4}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;letter-spacing:.04em}
  .badge.member{color:#fff}
  .badge.type{background:var(--paq-light);color:var(--paq-deep);border:1px solid var(--line)}
  .card-venue{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
  .card-flags{display:flex;gap:8px;margin-top:9px;font-size:11px;color:var(--ink-soft);flex-wrap:wrap}
  .flag{display:inline-flex;align-items:center;gap:4px;background:var(--paq-pale);padding:3px 9px;border-radius:8px;border:1px solid var(--line)}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
  .empty .big{font-size:40px;margin-bottom:10px;opacity:.5}

  .cal-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px}
  .cal-nav button{background:#fff;border:1.5px solid var(--line);width:40px;height:40px;border-radius:50%;cursor:pointer;color:var(--paq-deep);font-size:18px}
  .cal-title{font-family:var(--font-disp);font-weight:800;font-size:18px;color:var(--paq-dark);min-width:150px;text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding:6px 0;font-family:var(--font-disp)}
  .cal-cell{
    min-height:64px;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:10px;padding:5px;position:relative
  }
  .cal-cell.blank{background:transparent;border:none}
  .cal-cell.today{border-color:var(--paq-deep);box-shadow:0 0 0 1px var(--paq-deep) inset}
  .cal-cell.has{cursor:pointer}
  .cal-num{font-size:12px;font-weight:600;color:var(--ink-soft);font-family:var(--font-disp)}
  .cal-cell.sun .cal-num{color:#d06a8a}
  .cal-cell.sat .cal-num{color:#3f8fbf}
  .cal-ev{font-size:9.5px;line-height:1.3;margin-top:3px;padding:2px 4px;border-radius:5px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-more{font-size:9px;color:var(--ink-soft);margin-top:2px}

  .overlay{position:fixed;inset:0;background:rgba(17,75,70,.32);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:calc(env(safe-area-inset-top) + 24px) 14px 24px;z-index:100;overflow-y:auto}
  .modal{
    background:linear-gradient(180deg,#ffffff,#f7fdfc);border:1px solid var(--line);border-radius:24px;
    width:100%;max-width:560px;box-shadow:0 30px 80px -20px rgba(17,75,70,.5);overflow:hidden;animation:pop .22s ease
  }
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .modal-head{background:var(--pearl);padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
  .modal-head h2{font-family:var(--font-disp);font-weight:800;font-size:19px;color:var(--paq-dark);letter-spacing:.03em}
  .x{background:rgba(255,255,255,.55);border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--paq-dark);line-height:1}
  .modal-body{padding:20px 22px;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  label.fld{display:block;margin-bottom:15px}
  label.fld .lab{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.06em}
  input,select,textarea{
    width:100%;font-family:var(--font-body);font-size:16px;color:var(--ink);
    padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;background:#fff;transition:.15s
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--paq);box-shadow:0 0 0 3px rgba(111,227,213,.25)}
  textarea{resize:vertical;min-height:70px}
  .two{display:flex;gap:12px}
  .two>label{flex:1}
  .seg{display:flex;flex-wrap:wrap;gap:6px}
  .seg .opt{font-size:13px;padding:8px 13px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;background:#fff;transition:.15s;color:var(--ink-soft)}
  .seg .opt.sel{background:var(--paq-deep);color:#fff;border-color:var(--paq-deep)}
  .modal-foot{padding:16px 22px calc(16px + env(safe-area-inset-bottom));display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--line);flex-wrap:wrap}
  .btn{font-family:var(--font-disp);font-weight:700;font-size:14px;padding:11px 22px;border-radius:999px;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:.15s}
  .btn.primary{background:linear-gradient(120deg,var(--paq-deep),var(--paq-mid));color:#fff;border:none;box-shadow:var(--shadow)}
  .btn.danger{color:#c0556f;border-color:#f1cdd7}

  .det-sec{margin-bottom:20px}
  .det-sec h3{font-family:var(--font-disp);font-weight:800;font-size:13px;letter-spacing:.1em;color:var(--paq-deep);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .det-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
  .det-desc{font-size:14px;color:var(--ink);background:var(--paq-pale);border:1px solid var(--line);border-radius:12px;padding:12px 14px;white-space:pre-wrap}
  .sns-item{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .sns-ic{font-size:18px;flex-shrink:0;margin-top:1px}
  .sns-body{flex:1;min-width:0}
  .sns-body a{color:var(--paq-deep);font-size:12.5px;word-break:break-all;text-decoration:none;font-weight:600}
  .sns-txt{font-size:13px;margin-top:3px;white-space:pre-wrap}
  .sns-del{background:none;border:none;color:#c79;cursor:pointer;font-size:15px;flex-shrink:0;padding:2px 6px}
  .stars{font-size:26px;letter-spacing:4px;cursor:pointer;user-select:none}
  .star{color:#d6ece8}.star.fill{color:#f4c95d}
  .imp-box{font-size:14px;white-space:pre-wrap;background:var(--paq-pale);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink)}
  .add-mini{font-size:13px;color:var(--paq-deep);background:none;border:1.5px dashed var(--line);border-radius:10px;padding:10px;width:100%;cursor:pointer;font-weight:600;transition:.15s}
  .note{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.5}

  .sync-banner{
    background:rgba(255,255,255,.6);border:1px dashed var(--paq);border-radius:14px;
    padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--ink-soft);line-height:1.6;display:flex;gap:10px;align-items:flex-start
  }
  .sync-banner b{color:var(--paq-deep)}
  .sync-banner .ic{font-size:16px}
  footer{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:30px;letter-spacing:.08em;font-family:var(--font-disp)}

  .fetch-item{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px}
  .fetch-item.dup{opacity:.55;background:var(--paq-pale)}
  .fetch-item input[type=checkbox]{width:auto;margin-top:3px;accent-color:var(--paq-deep);flex-shrink:0;transform:scale(1.3)}
  .fi-body{flex:1;min-width:0}
  .fi-title{font-weight:700;font-size:14.5px;line-height:1.4;margin-bottom:6px}
  .fi-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .fi-date{font-family:var(--font-disp);font-weight:700;font-size:12px;color:var(--paq-deep)}
  .fi-venue{font-size:12px;color:var(--ink-soft)}
  .fi-dup{font-size:11px;color:var(--paq-deep);margin-top:5px;font-weight:600}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div id="app">
  <header>
    <div class="crest">◇ 💎 ◇</div>
    <h1>SHINee Diary</h1>
    <div class="subtitle">SCHEDULE &amp; LIVE NOTE</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="list">📋 一覧</button>
    <button class="tab" data-view="cal">🗓 カレンダー</button>
  </div>

  <div class="sync-banner">
    <span class="ic">💎</span>
    <span>記録はこの端末内に保存されます。GASから届いた新着メールのJSONは<b>「⬇ インポート」</b>で取り込めます。ブラウザのメニューから<b>「ホーム画面に追加」</b>すると、全画面のアプリとして使えます。</span>
  </div>

  <div id="filters" class="filters"></div>

  <div class="toolbar">
    <div class="count" id="count"></div>
    <div class="tool-btns">
      <button class="btn-fetch" id="importBtn">⬇ インポート</button>
      <button class="btn-add" id="addBtn">＋ 予定を追加</button>
    </div>
  </div>

  <div id="content"></div>

  <footer>◇ Pearl Aqua Green ◇ &nbsp;<span style="opacity:.55">build v5</span></footer>
</div>

<div id="modalRoot"></div>

<script>
/* ===================== config ===================== */
const MEMBERS = [
  {id:'all',    name:'全体',   color:'var(--m-all)',    raw:'#1F9E92'},
  {id:'onew',   name:'オンユ', color:'var(--m-onew)',   raw:'#27B79A'},
  {id:'key',    name:'キー',   color:'var(--m-key)',    raw:'#229FB0'},
  {id:'minho',  name:'ミンホ', color:'var(--m-minho)',  raw:'#4FC388'},
  {id:'taemin', name:'テミン', color:'var(--m-taemin)', raw:'#2E9FCF'},
];
const TYPES = [
  {id:'live',    name:'LIVE',        icon:'🎤'},
  {id:'tv',      name:'TV番組',      icon:'📺'},
  {id:'event',   name:'イベント',    icon:'🎉'},
  {id:'release', name:'リリース',    icon:'💿'},
  {id:'radio',   name:'ラジオ・配信',icon:'📻'},
  {id:'other',   name:'その他',      icon:'✨'},
];
const SNS = [
  {id:'twitter',   name:'X / Twitter', icon:'🐦'},
  {id:'instagram', name:'Instagram',   icon:'📷'},
  {id:'youtube',   name:'YouTube',     icon:'▶️'},
  {id:'official',  name:'公式サイト',  icon:'🌐'},
  {id:'other',     name:'その他',      icon:'🔗'},
];
const WD = ['日','月','火','水','木','金','土'];
const memberOf = id => MEMBERS.find(m=>m.id===id)||MEMBERS[0];
const typeOf   = id => TYPES.find(t=>t.id===id)||TYPES[TYPES.length-1];
const snsOf    = id => SNS.find(s=>s.id===id)||SNS[SNS.length-1];

/* ===================== seed (実データ + 一部サンプル) ===================== */
const SEED = [
  {id:'s1', title:'2026 SHINee WORLD VIII : [THE INVERT] 日本公演 Day2', date:'2026-06-07', time:'16:00', member:'all', type:'live', venue:'埼玉・ベルーナドーム', desc:'日本デビュー15周年公演 / 2日目。14:00開場・16:00開演。', sns:[], impression:'', rating:0},
  {id:'s2', title:'2026 SHINee WORLD VIII : [THE INVERT] 日本公演 Day1', date:'2026-06-05', time:'18:30', member:'all', type:'live', venue:'埼玉・ベルーナドーム', desc:'初日。16:30開場・18:30開演。', sns:[], impression:'', rating:0},
  {id:'s3', title:'WOWOW独占生中継「THE INVERT」日本公演', date:'2026-06-07', time:'16:00', member:'all', type:'tv', venue:'WOWOW', desc:'日本公演を独占生中継。', sns:[], impression:'', rating:0},
  {id:'s4', title:'2026 SHINee WORLD VIII : [THE INVERT] ソウル公演（最終日）', date:'2026-05-31', time:'', member:'all', type:'live', venue:'ソウル・KSPO DOME', desc:'5/29〜31の3日間公演の最終日。', sns:[], impression:'', rating:0},
  {id:'s5', title:'The 6th Mini Album『Atmos』リスニングパーティー', date:'2026-06-01', time:'21:00', member:'all', type:'event', venue:'AWAラウンジ', desc:'メンバーボイスコメントもオンエア。', sns:[], impression:'', rating:0},
  {id:'s6', title:'The 6th Mini Album『Atmos』リリース', date:'2026-05-25', time:'', member:'all', type:'release', venue:'', desc:'※リリース日はサンプルです。公式情報でご確認ください。', sns:[], impression:'', rating:0},
  {id:'s7', title:'テミン ソロ東京公演（サンプル）', date:'2025-04-12', time:'18:00', member:'taemin', type:'live', venue:'東京', desc:'※過去の例としてのサンプルです。', sns:[], impression:'', rating:0},
];

/* ===================== state + storage (localStorage) ===================== */
const KEY='shinee_diary_v1';
const firstOfMonth=(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1);})();
let state={entries:[], view:'list', fMember:'all-cat', fType:'all', fWhen:'all', calDate:firstOfMonth};

async function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){ state.entries=JSON.parse(raw); return; }
  }catch(e){/* ignore */}
  state.entries=SEED.map(x=>({...x}));
  await save();
}
async function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state.entries)); }catch(e){
    alert('保存できませんでした。ブラウザのプライベートモードでは記録が残らないことがあります。');
  }
}

/* ===================== helpers ===================== */
const todayStr=()=>{const d=new Date();const z=n=>('0'+n).slice(-2);return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());};
function fmtDate(s){if(!s)return '日付未定';const d=new Date(s+'T00:00');return `${d.getMonth()+1}/${d.getDate()}`;}
function wdOf(s){if(!s)return '';const d=new Date(s+'T00:00');return WD[d.getDay()];}
function monthKey(s){if(!s)return '日付未定';const d=new Date(s+'T00:00');return `${d.getFullYear()}年 ${d.getMonth()+1}月`;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isPast(s){if(!s)return false;return s<todayStr();}

function filtered(){
  return state.entries.filter(e=>{
    if(state.fMember!=='all-cat' && e.member!==state.fMember) return false;
    if(state.fType!=='all' && e.type!==state.fType) return false;
    if(state.fWhen==='upcoming' && isPast(e.date)) return false;
    if(state.fWhen==='past' && !isPast(e.date)) return false;
    return true;
  }).sort((a,b)=>{
    if(!a.date && !b.date) return 0;
    if(!a.date) return 1;
    if(!b.date) return -1;
    const A=a.date+(a.time||'99:99'), B=b.date+(b.time||'99:99');
    return state.fWhen==='past' ? (A<B?1:-1) : (A>B?1:-1);
  });
}

/* ===================== filters render ===================== */
function renderFilters(){
  const f=document.getElementById('filters');
  const memChips=[{id:'all-cat',name:'すべて',raw:'#9bbab5'}]
    .concat(MEMBERS).map(m=>{
      const on=state.fMember===m.id?'on':'';
      const dot=m.id==='all-cat'?'':`<span class="dot" style="background:${m.raw}"></span>`;
      return `<div class="chip ${on}" data-fmember="${m.id}">${dot}${m.name}</div>`;
    }).join('');
  const typeChips=[{id:'all',name:'すべて',icon:''}].concat(TYPES).map(t=>{
    const on=state.fType===t.id?'on':'';
    return `<div class="chip ${on}" data-ftype="${t.id}">${t.icon?t.icon+' ':''}${t.name}</div>`;
  }).join('');
  const whenChips=[['all','すべて'],['upcoming','今後'],['past','過去']].map(([id,nm])=>
    `<div class="chip ${state.fWhen===id?'on':''}" data-fwhen="${id}">${nm}</div>`).join('');

  f.innerHTML=`
    <div class="filter-row"><span class="filter-label">MEMBER</span>${memChips}</div>
    <div class="filter-row"><span class="filter-label">CATEGORY</span>${typeChips}</div>
    <div class="filter-row"><span class="filter-label">TIME</span>${whenChips}</div>`;

  f.querySelectorAll('[data-fmember]').forEach(c=>c.onclick=()=>{state.fMember=c.dataset.fmember;render();});
  f.querySelectorAll('[data-ftype]').forEach(c=>c.onclick=()=>{state.fType=c.dataset.ftype;render();});
  f.querySelectorAll('[data-fwhen]').forEach(c=>c.onclick=()=>{state.fWhen=c.dataset.fwhen;render();});
}

/* ===================== list render ===================== */
function cardHTML(e){
  const m=memberOf(e.member), t=typeOf(e.type);
  const past=isPast(e.date)?'past':'';
  const snsN=(e.sns||[]).length;
  const flags=[];
  if(e.auto) flags.push(`<span class="flag">🔄 自動取得</span>`);
  if(snsN) flags.push(`<span class="flag">🔗 投稿 ${snsN}</span>`);
  if(e.impression) flags.push(`<span class="flag">📝 感想あり</span>`);
  if(e.rating) flags.push(`<span class="flag">⭐ ${e.rating}</span>`);
  return `<div class="card ${past}" style="--accent:${m.color}" data-open="${e.id}">
    <div class="card-top">
      <div>
        <div class="card-date">${fmtDate(e.date)}${wdOf(e.date)?`<span class="wd">(${wdOf(e.date)})</span>`:''}</div>
        ${e.time?`<div class="card-time">${e.time}〜</div>`:''}
      </div>
      <span class="badge member" style="background:${m.color}">${m.name}</span>
    </div>
    <div class="card-title">${esc(e.title)}</div>
    ${e.venue?`<div class="card-venue">📍 ${esc(e.venue)}</div>`:''}
    <div class="card-meta">
      <span class="badge type">${t.icon} ${t.name}</span>
    </div>
    ${flags.length?`<div class="card-flags">${flags.join('')}</div>`:''}
  </div>`;
}
function renderList(){
  const list=filtered();
  const c=document.getElementById('content');
  if(!list.length){c.innerHTML=`<div class="empty"><div class="big">💎</div>該当する予定がありません。<br>「＋ 予定を追加」から登録できます。</div>`;return;}
  let html='', curMonth='';
  list.forEach(e=>{
    const mk=monthKey(e.date);
    if(mk!==curMonth){curMonth=mk;html+=`<div class="month-head">${mk}</div>`;}
    html+=cardHTML(e);
  });
  c.innerHTML=html;
  c.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openDetail(el.dataset.open));
}

/* ===================== calendar render ===================== */
function renderCal(){
  const c=document.getElementById('content');
  const y=state.calDate.getFullYear(), mo=state.calDate.getMonth();
  const first=new Date(y,mo,1), start=first.getDay(), days=new Date(y,mo+1,0).getDate();
  const evs={};
  filtered().forEach(e=>{
    const d=new Date(e.date+'T00:00');
    if(d.getFullYear()===y&&d.getMonth()===mo){(evs[d.getDate()]=evs[d.getDate()]||[]).push(e);}
  });
  let cells='';
  for(let i=0;i<start;i++) cells+=`<div class="cal-cell blank"></div>`;
  for(let d=1;d<=days;d++){
    const dow=new Date(y,mo,d).getDay();
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const list=evs[d]||[];
    const today=ds===todayStr()?'today':'';
    const cls=dow===0?'sun':dow===6?'sat':'';
    let evHtml=list.slice(0,2).map(e=>{
      const m=memberOf(e.member);
      return `<div class="cal-ev" style="background:${m.color}" data-open="${e.id}">${typeOf(e.type).icon}${esc(e.title).slice(0,6)}</div>`;
    }).join('');
    if(list.length>2) evHtml+=`<div class="cal-more">+${list.length-2}件</div>`;
    cells+=`<div class="cal-cell ${list.length?'has':''} ${today} ${cls}"><div class="cal-num">${d}</div>${evHtml}</div>`;
  }
  c.innerHTML=`
    <div class="cal-nav">
      <button id="prevM">‹</button>
      <div class="cal-title">${y}年 ${mo+1}月</div>
      <button id="nextM">›</button>
    </div>
    <div class="cal-grid">${WD.map((w,i)=>`<div class="cal-wd ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}${cells}</div>`;
  document.getElementById('prevM').onclick=()=>{state.calDate=new Date(y,mo-1,1);render();};
  document.getElementById('nextM').onclick=()=>{state.calDate=new Date(y,mo+1,1);render();};
  c.querySelectorAll('[data-open]').forEach(el=>el.onclick=(ev)=>{ev.stopPropagation();openDetail(el.dataset.open);});
}

/* ===================== add / edit modal ===================== */
function openForm(entry){
  const isEdit=!!entry;
  const e=entry||{id:'e'+Date.now(),title:'',date:todayStr(),time:'',member:'all',type:'live',venue:'',desc:'',sns:[],impression:'',rating:0};
  const memOpts=MEMBERS.map(m=>`<div class="opt ${e.member===m.id?'sel':''}" data-mem="${m.id}">${m.name}</div>`).join('');
  const typeOpts=TYPES.map(t=>`<div class="opt ${e.type===t.id?'sel':''}" data-typ="${t.id}">${t.icon} ${t.name}</div>`).join('');
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay" id="ov">
    <div class="modal">
      <div class="modal-head"><h2>${isEdit?'予定を編集':'予定を追加'}</h2><button class="x" id="cx">✕</button></div>
      <div class="modal-body">
        <label class="fld"><span class="lab">タイトル</span><input id="f_title" value="${esc(e.title)}" placeholder="例：SHINee WORLD ◯◯ 公演"></label>
        <div class="two">
          <label class="fld"><span class="lab">日付</span><input type="date" id="f_date" value="${e.date}"></label>
          <label class="fld"><span class="lab">時間（任意）</span><input type="time" id="f_time" value="${e.time}"></label>
        </div>
        <label class="fld"><span class="lab">メンバー</span><div class="seg" id="seg_mem">${memOpts}</div></label>
        <label class="fld"><span class="lab">カテゴリー</span><div class="seg" id="seg_type">${typeOpts}</div></label>
        <label class="fld"><span class="lab">会場・チャンネル（任意）</span><input id="f_venue" value="${esc(e.venue)}" placeholder="例：東京ドーム / WOWOW"></label>
        <label class="fld"><span class="lab">メモ（任意）</span><textarea id="f_desc" placeholder="開場時間・出演者・詳細など">${esc(e.desc)}</textarea></label>
      </div>
      <div class="modal-foot">
        ${isEdit?'<button class="btn danger" id="del">削除</button>':''}
        <button class="btn" id="cancel">キャンセル</button>
        <button class="btn primary" id="save">保存</button>
      </div>
    </div></div>`;
  let mem=e.member, typ=e.type;
  root.querySelectorAll('#seg_mem .opt').forEach(o=>o.onclick=()=>{mem=o.dataset.mem;root.querySelectorAll('#seg_mem .opt').forEach(x=>x.classList.toggle('sel',x===o));});
  root.querySelectorAll('#seg_type .opt').forEach(o=>o.onclick=()=>{typ=o.dataset.typ;root.querySelectorAll('#seg_type .opt').forEach(x=>x.classList.toggle('sel',x===o));});

/* ===================== JSON parse + 取り込み確認 ===================== */
function parseItems(text){
  if(!text) return [];
  let t=text.replace(/```json|```/g,'')
            .replace(/[\u201C\u201D\u201E\u201F\u2033]/g,'"')   // 各種ダブルクォート → "
            .replace(/[\u2018\u2019\u201A\u201B\u2032]/g,"'")   // 各種シングルクォート → '
            .trim();
  const s=t.indexOf('['), e=t.lastIndexOf(']');
  if(s<0||e<0) return [];
  let arr; try{ arr=JSON.parse(t.slice(s,e+1)); }catch(err){ return []; }
  if(!Array.isArray(arr)) return [];
  const vM=['all','onew','key','minho','taemin'], vT=['live','tv','event','release','radio','other'];
  return arr.filter(x=>x&&x.title).map(x=>({
    title:String(x.title).slice(0,120),
    date:/^\d{4}-\d{2}-\d{2}$/.test(x.date||'')?x.date:'',
    time:/^\d{1,2}:\d{2}$/.test(x.time||'')?x.time:'',
    member:vM.includes(x.member)?x.member:'all',
    type:vT.includes(x.type)?x.type:'other',
    venue:String(x.venue||'').slice(0,80),
    desc:String(x.desc||'').slice(0,200)
  })).slice(0,30);
}
function diagnoseImport(raw){
  if(!raw||!raw.trim()) return '貼り付け欄が空です。メールのJSON（[ から ] まで）を貼り付けてください。';
  let t=raw.replace(/```json|```/g,'').replace(/[\u201C\u201D\u201E\u201F\u2033]/g,'"').replace(/[\u2018\u2019\u201A\u201B\u2032]/g,"'").trim();
  const s=t.indexOf('['), e=t.lastIndexOf(']');
  if(s<0||e<0) return 'JSON配列（[ ... ]）が見つかりません。メールの中の「[」から「]」までを全部コピーして貼り付けてください。';
  let arr; try{ arr=JSON.parse(t.slice(s,e+1)); }catch(err){
    return 'JSONとして読み取れませんでした。コピーが途中で切れていないか、余分な文字が混ざっていないかご確認ください。';
  }
  if(!Array.isArray(arr)) return 'JSONは読めましたが配列（[ ... ]）の形ではありませんでした。';
  if(!arr.length) return 'JSONは空（0件）でした。新着が無かった可能性があります。';
  if(!arr.filter(x=>x&&x.title).length) return 'JSONは読めましたが、title（タイトル）が入った項目がありませんでした。';
  return '取り込みに失敗しました。お手数ですが、貼り付けたJSONをそのまま共有してください。原因を特定します。';
}
function openFetchResults(items){
  const exist=new Set(state.entries.map(e=>e.date+'|'+e.title.trim()));
  const root=document.getElementById('modalRoot');
  let dupCount=0;
  const rows=items.map((it,i)=>{
    const dup=exist.has(it.date+'|'+it.title.trim());
    if(dup) dupCount++;
    const m=memberOf(it.member), t=typeOf(it.type);
    return `<label class="fetch-item ${dup?'dup':''}">
      <input type="checkbox" data-i="${i}" ${dup?'disabled':'checked'}>
      <div class="fi-body">
        <div class="fi-title">${t.icon} ${esc(it.title)}</div>
        <div class="fi-meta">
          <span class="badge member" style="background:${m.color}">${m.name}</span>
          <span class="badge type">${t.name}</span>
          <span class="fi-date">${fmtDate(it.date)}${wdOf(it.date)?`(${wdOf(it.date)})`:''}${it.time?' '+it.time:''}</span>
          ${it.venue?`<span class="fi-venue">📍${esc(it.venue)}</span>`:''}
        </div>
        ${dup?'<div class="fi-dup">登録済み</div>':''}
      </div>
    </label>`;
  }).join('');
  root.innerHTML=`<div class="overlay" id="ovf">
    <div class="modal">
      <div class="modal-head"><h2 style="font-size:17px">⬇ 取り込むスケジュール</h2><button class="x" id="cxf">✕</button></div>
      <div class="modal-body">
        <div class="note" style="margin-bottom:14px">見つかった項目: <b>${items.length}件</b>（新規 ${items.length-dupCount}件 / 登録済み ${dupCount}件）。新規にチェックを入れて「追加」してください。${(dupCount===items.length&&items.length>0)?'<br><b>※すべて登録済みのため、新しく追加できる項目はありません。</b>':''}</div>
        ${rows||'<div class="note">候補が見つかりませんでした。</div>'}
      </div>
      <div class="modal-foot">
        <button class="btn" id="fCancel">キャンセル</button>
        <button class="btn primary" id="fAdd">選択した項目を追加</button>
      </div>
    </div></div>`;
  const ov=document.getElementById('ovf'), close=()=>root.innerHTML='';
  ov.querySelector('#cxf').onclick=close;
  ov.querySelector('#fCancel').onclick=close;
  ov.onclick=ev=>{if(ev.target.id==='ovf')close();};
  ov.querySelector('#fAdd').onclick=async()=>{
    const idx=[...ov.querySelectorAll('input[type=checkbox]:checked')].map(c=>+c.dataset.i);
    if(!idx.length){close();return;}
    idx.forEach(i=>{
      const it=items[i];
      state.entries.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,6),
        title:it.title,date:it.date,time:it.time,member:it.member,type:it.type,venue:it.venue,
        desc:(it.desc?it.desc+' ':'')+'※自動取得・要確認',sns:[],impression:'',rating:0,auto:true});
    });
    await save(); close(); render();
    alert(idx.length+'件を追加しました。');
  };
}

  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay" id="ovi">
    <div class="modal" style="max-width:520px">

        <textarea id="imp_json" style="min-height:180px;font-family:monospace;font-size:13px" placeholder='[{"title":"...","date":"2026-06-07","time":"16:00","member":"all","type":"live","venue":"...","desc":"..."}]'></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn" id="i_cancel">キャンセル</button>
        <button class="btn primary" id="i_load">読み込む</button>
      </div>
    </div></div>`;
  const ov=document.getElementById('ovi'), close=()=>root.innerHTML='';
  ov.querySelector('#cxi').onclick=close;
  ov.querySelector('#i_cancel').onclick=close;
  ov.onclick=ev=>{if(ev.target.id==='ovi')close();};

(function(){

      name:'SHINee Diary', short_name:'SHINee', description:'SHINee スケジュール＆ライブ記録',
      start_url:'.', scope:'.', display:'standalone', orientation:'portrait',

        {src:icon, sizes:'192x192', type:'image/png', purpose:'any maskable'},
        {src:icon, sizes:'512x512', type:'image/png', purpose:'any maskable'}

    };
    const blob=new Blob([JSON.stringify(mani)],{type:'application/json'});
    const l=document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(blob);
    document.head.appendChild(l);
  }catch(e){}
})();

    var bar=document.getElementById('errbar');

      bar=document.createElement('div'); bar.id='errbar';
      bar.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#b3203f;color:#fff;font:12px/1.4 monospace;padding:8px 12px;white-space:pre-wrap';
      document.body.appendChild(bar);
    }
    bar.textContent='⚠ JSエラー: '+(ev.message||'')+'  ('+String(ev.filename||'').split('/').pop()+':'+(ev.lineno||'?')+')';
  }catch(e){}
});
